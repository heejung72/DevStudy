<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(${lesson.title}, ~{::content})}">
<body>
<div th:fragment="content">

    <div class="container py-5">
        <div class="row">

            <!-- 메인 컨텐츠 -->
            <div class="col-lg-8">

                <!-- 레슨 헤더 -->
                <div class="lesson-header mb-4 p-4 rounded-3" style="background: linear-gradient(135deg, #1a1a2e, #0f3460); color: white;">
                    <div class="d-flex align-items-center gap-2 mb-2">
                        <span class="badge bg-warning text-dark" th:text="'Lesson ' + ${lesson.orderNum}"></span>
                        <span class="badge bg-light text-dark" th:text="${lesson.category}"></span>
                        <span class="badge"
                              th:classappend="${lesson.difficulty == '입문'} ? 'bg-success' : (${lesson.difficulty == '초급'} ? 'bg-info' : 'bg-warning text-dark')"
                              th:text="${lesson.difficulty}"></span>
                    </div>
                    <h1 class="h2 fw-bold mb-2" th:text="${lesson.title}"></h1>
                    <p class="mb-0 text-light" th:text="${lesson.description}"></p>
                </div>

                <!-- 레슨 내용 -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-header bg-white border-bottom">
                        <h5 class="mb-0 fw-bold"><i class="bi bi-journal-text me-2 text-primary"></i>개념 설명</h5>
                    </div>
                    <div class="card-body lesson-content" th:utext="${lesson.content}">
                    </div>
                </div>

                <!-- 코드 예제 -->
                <div class="card border-0 shadow-sm mb-4" th:if="${lesson.codeExample != null}">
                    <div class="card-header d-flex justify-content-between align-items-center" style="background: #282c34; color: white;">
                        <span><i class="bi bi-code-slash me-2"></i>코드 예제</span>
                        <button class="btn btn-sm btn-outline-light copy-btn" onclick="copyCode(this)">
                            <i class="bi bi-clipboard me-1"></i>복사
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <pre class="mb-0"><code class="language-java" th:text="${lesson.codeExample}"></code></pre>
                    </div>
                </div>

                <!-- 네비게이션 -->
                <div class="d-flex justify-content-between align-items-center mt-4">
                    <a th:if="${prevLesson != null}"
                       th:href="@{/lessons/{id}(id=${prevLesson.id})}"
                       class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i>
                        <span th:text="${prevLesson.title}"></span>
                    </a>
                    <span th:if="${prevLesson == null}"></span>

                    <a th:href="@{/quiz/{id}(id=${lesson.id})}"
                       class="btn btn-warning fw-bold px-4">
                        <i class="bi bi-patch-question me-1"></i>퀴즈 풀기
                    </a>

                    <a th:if="${nextLesson != null}"
                       th:href="@{/lessons/{id}(id=${nextLesson.id})}"
                       class="btn btn-outline-primary">
                        <span th:text="${nextLesson.title}"></span>
                        <i class="bi bi-arrow-right ms-1"></i>
                    </a>
                    <span th:if="${nextLesson == null}"></span>
                </div>

            </div>

            <!-- 사이드바 -->
            <div class="col-lg-4">

                <!-- 퀴즈 안내 -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body text-center p-4">
                        <i class="bi bi-patch-question display-4 text-warning mb-3 d-block"></i>
                        <h6 class="fw-bold">퀴즈로 확인하기</h6>
                        <p class="text-muted small mb-3">
                            <span th:text="${#lists.size(questions)}">0</span>문제로 이해도를 점검하세요.<br>
                            60점 이상이면 통과!
                        </p>
                        <a th:href="@{/quiz/{id}(id=${lesson.id})}" class="btn btn-warning w-100 fw-bold">
                            <i class="bi bi-play-circle me-1"></i>퀴즈 시작
                        </a>
                    </div>
                </div>

                <!-- 학습 팁 -->
                <div class="card border-0 shadow-sm mb-4" style="background: #f8f9ff;">
                    <div class="card-body p-3">
                        <h6 class="fw-bold text-primary mb-3"><i class="bi bi-lightbulb me-1"></i>학습 팁</h6>
                        <ul class="list-unstyled mb-0 small text-muted">
                            <li class="mb-2"><i class="bi bi-check-circle text-success me-1"></i>코드를 직접 IDE에서 실행해보세요</li>
                            <li class="mb-2"><i class="bi bi-check-circle text-success me-1"></i>값을 바꿔가며 결과를 확인하세요</li>
                            <li class="mb-2"><i class="bi bi-check-circle text-success me-1"></i>이해가 안 되면 다시 읽어보세요</li>
                            <li><i class="bi bi-check-circle text-success me-1"></i>퀴즈를 꼭 풀어보세요</li>
                        </ul>
                    </div>
                </div>

                <!-- 전체 목차 미니 -->
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white">
                        <h6 class="mb-0 fw-bold"><i class="bi bi-list-ol me-1 text-primary"></i>전체 목차</h6>
                    </div>
                    <div class="card-body p-0">
                        <div class="list-group list-group-flush">
                            <a th:href="@{/lessons/{id}(id=${lesson.id - 1})}"
                               th:if="${prevLesson != null}"
                               class="list-group-item list-group-item-action small py-2">
                                <i class="bi bi-chevron-left text-muted me-1"></i>
                                <span th:text="${prevLesson.title}"></span>
                            </a>
                            <div class="list-group-item active small py-2" style="background: #0f3460;">
                                <i class="bi bi-play-fill me-1"></i>
                                <strong th:text="${lesson.title}"></strong>
                            </div>
                            <a th:href="@{/lessons/{id}(id=${nextLesson.id})}"
                               th:if="${nextLesson != null}"
                               class="list-group-item list-group-item-action small py-2">
                                <i class="bi bi-chevron-right text-muted me-1"></i>
                                <span th:text="${nextLesson.title}"></span>
                            </a>
                        </div>
                    </div>
                    <div class="card-footer bg-transparent">
                        <a th:href="@{/lessons}" class="btn btn-outline-secondary btn-sm w-100">전체 목차 보기</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

</div>
</body>
</html>
