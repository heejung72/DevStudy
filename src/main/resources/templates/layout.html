<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | devStudy'">devStudy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" th:href="@{/}">
            <i class="bi bi-code-square me-2 text-warning"></i>devStudy
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"><i class="bi bi-house me-1"></i>홈</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/lessons}"><i class="bi bi-book me-1"></i>레슨</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/progress}"><i class="bi bi-bar-chart me-1"></i>내 진행도</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main>
    <div th:replace="${content}"></div>
</main>

<footer class="footer mt-auto py-4" style="background: #1a1a2e; color: #adb5bd;">
    <div class="container text-center">
        <p class="mb-1"><i class="bi bi-code-square text-warning me-2"></i><strong class="text-white">devStudy</strong> — 초보 개발자를 위한 Java 학습 플랫폼</p>
        <small>포기하지 마세요. 모든 고수도 처음엔 초보였습니다. 🚀</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
